# Continuous Integration pipeline for BCC (Blitzy C Compiler)
#
# This workflow validates the compiler across four phases:
#   1. Build — Compile in both release and debug modes
#   2. Test  — Run all unit tests and integration tests
#   3. Clippy — Lint with warnings-as-errors enforcement
#   4. Fmt   — Verify consistent code formatting
#
# The project has zero external Rust crate dependencies (only std),
# but requires cross-architecture system CRT objects and QEMU for
# multi-architecture testing of x86-64, i686, AArch64, and RISC-V 64.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build — Compile the compiler in release and debug modes
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libc6-dev-i386-cross \
            libc6-dev-arm64-cross \
            libc6-dev-riscv64-cross \
            qemu-user-static

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build (release)
        run: cargo build --release

      - name: Build (debug)
        run: cargo build

  # ---------------------------------------------------------------------------
  # Job 2: Test — Run all unit tests and integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libc6-dev-i386-cross \
            libc6-dev-arm64-cross \
            libc6-dev-riscv64-cross \
            qemu-user-static

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test

      - name: Run ignored (slow) tests
        run: cargo test -- --ignored

  # ---------------------------------------------------------------------------
  # Job 3: Clippy — Lint the codebase with warnings treated as errors
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libc6-dev-i386-cross \
            libc6-dev-arm64-cross \
            libc6-dev-riscv64-cross \
            qemu-user-static

      - name: Install Rust stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy (warnings as errors)
        run: cargo clippy -- -D warnings

  # ---------------------------------------------------------------------------
  # Job 4: Cross-Architecture Tests — Build, cross-compile, run via QEMU
  # ---------------------------------------------------------------------------
  cross-arch:
    name: Cross-Architecture Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev \
            libc6-dev-i386-cross \
            libc6-dev-arm64-cross \
            libc6-dev-riscv64-cross \
            qemu-user-static

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-

      - name: Build compiler (release)
        run: cargo build --release

      - name: Create cross-architecture test programs
        run: |
          mkdir -p cross-tests

          # Test 1: Simple return value
          cat > cross-tests/return42.c << 'EOF'
          int main(void) { return 42; }
          EOF

          # Test 2: Function calls with arguments
          cat > cross-tests/add.c << 'EOF'
          int add(int a, int b) { return a + b; }
          int main(void) { return add(30, 12); }
          EOF

          # Test 3: Recursion (factorial)
          cat > cross-tests/factorial.c << 'EOF'
          int factorial(int n) {
              if (n <= 1) return 1;
              return n * factorial(n - 1);
          }
          int main(void) { return factorial(5); }
          EOF

          # Test 4: Loop (sum)
          cat > cross-tests/loop.c << 'EOF'
          int sum_to(int n) {
              int result = 0;
              int i = 1;
              while (i <= n) {
                  result = result + i;
                  i = i + 1;
              }
              return result;
          }
          int main(void) { return sum_to(10); }
          EOF

          # Test 5: Conditionals
          cat > cross-tests/cond.c << 'EOF'
          int abs_val(int x) {
              if (x < 0) return -x;
              return x;
          }
          int max(int a, int b) {
              if (a > b) return a;
              return b;
          }
          int main(void) {
              int a = abs_val(-7);
              int b = max(3, 10);
              return a + b;
          }
          EOF

      - name: "Stage 1: x86_64 native tests"
        run: |
          echo "========================================="
          echo "x86_64 Native Tests"
          echo "========================================="
          PASS=0; FAIL=0
          for test in cross-tests/*.c; do
            NAME=$(basename "$test" .c)
            ./target/release/bcc --target x86_64-linux-gnu -o "cross-tests/${NAME}_x86_64" "$test" 2>/dev/null
            if [ $? -eq 0 ]; then
              "cross-tests/${NAME}_x86_64"; RC=$?
              case "$NAME" in
                return42) EXPECT=42 ;;
                add)      EXPECT=42 ;;
                factorial) EXPECT=120 ;;
                loop)     EXPECT=55 ;;
                cond)     EXPECT=17 ;;
                *)        EXPECT=$RC ;;
              esac
              if [ "$RC" -eq "$EXPECT" ]; then
                echo "  ✓ $NAME: exit=$RC (expected $EXPECT)"
                PASS=$((PASS+1))
              else
                echo "  ✗ $NAME: exit=$RC (expected $EXPECT)"
                FAIL=$((FAIL+1))
              fi
            else
              echo "  ✗ $NAME: compilation failed"
              FAIL=$((FAIL+1))
            fi
          done
          echo "x86_64: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: "Stage 2: i686 cross-compile + QEMU"
        run: |
          echo "========================================="
          echo "i686 Cross-Architecture Tests (QEMU)"
          echo "========================================="
          PASS=0; FAIL=0
          for test in cross-tests/*.c; do
            NAME=$(basename "$test" .c)
            ./target/release/bcc --target i686-linux-gnu -o "cross-tests/${NAME}_i686" "$test" 2>/dev/null
            if [ $? -eq 0 ]; then
              qemu-i386-static -L /usr/i686-linux-gnu "cross-tests/${NAME}_i686"; RC=$?
              case "$NAME" in
                return42) EXPECT=42 ;;
                add)      EXPECT=42 ;;
                factorial) EXPECT=120 ;;
                loop)     EXPECT=55 ;;
                cond)     EXPECT=17 ;;
                *)        EXPECT=$RC ;;
              esac
              if [ "$RC" -eq "$EXPECT" ]; then
                echo "  ✓ [i686] $NAME: exit=$RC (expected $EXPECT)"
                PASS=$((PASS+1))
              else
                echo "  ✗ [i686] $NAME: exit=$RC (expected $EXPECT)"
                FAIL=$((FAIL+1))
              fi
            else
              echo "  ✗ [i686] $NAME: compilation failed"
              FAIL=$((FAIL+1))
            fi
          done
          echo "i686: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: "Stage 3: AArch64 cross-compile + QEMU"
        run: |
          echo "========================================="
          echo "AArch64 Cross-Architecture Tests (QEMU)"
          echo "========================================="
          PASS=0; FAIL=0
          for test in cross-tests/*.c; do
            NAME=$(basename "$test" .c)
            ./target/release/bcc --target aarch64-linux-gnu -o "cross-tests/${NAME}_aarch64" "$test" 2>/dev/null
            if [ $? -eq 0 ]; then
              qemu-aarch64-static -L /usr/aarch64-linux-gnu "cross-tests/${NAME}_aarch64"; RC=$?
              case "$NAME" in
                return42) EXPECT=42 ;;
                add)      EXPECT=42 ;;
                factorial) EXPECT=120 ;;
                loop)     EXPECT=55 ;;
                cond)     EXPECT=17 ;;
                *)        EXPECT=$RC ;;
              esac
              if [ "$RC" -eq "$EXPECT" ]; then
                echo "  ✓ [aarch64] $NAME: exit=$RC (expected $EXPECT)"
                PASS=$((PASS+1))
              else
                echo "  ✗ [aarch64] $NAME: exit=$RC (expected $EXPECT)"
                FAIL=$((FAIL+1))
              fi
            else
              echo "  ✗ [aarch64] $NAME: compilation failed"
              FAIL=$((FAIL+1))
            fi
          done
          echo "AArch64: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: "Stage 4: RISC-V 64 cross-compile + QEMU"
        run: |
          echo "========================================="
          echo "RISC-V 64 Cross-Architecture Tests (QEMU)"
          echo "========================================="
          PASS=0; FAIL=0
          for test in cross-tests/*.c; do
            NAME=$(basename "$test" .c)
            ./target/release/bcc --target riscv64-linux-gnu -o "cross-tests/${NAME}_riscv64" "$test" 2>/dev/null
            if [ $? -eq 0 ]; then
              qemu-riscv64-static -L /usr/riscv64-linux-gnu "cross-tests/${NAME}_riscv64"; RC=$?
              case "$NAME" in
                return42) EXPECT=42 ;;
                add)      EXPECT=42 ;;
                factorial) EXPECT=120 ;;
                loop)     EXPECT=55 ;;
                cond)     EXPECT=17 ;;
                *)        EXPECT=$RC ;;
              esac
              if [ "$RC" -eq "$EXPECT" ]; then
                echo "  ✓ [riscv64] $NAME: exit=$RC (expected $EXPECT)"
                PASS=$((PASS+1))
              else
                echo "  ✗ [riscv64] $NAME: exit=$RC (expected $EXPECT)"
                FAIL=$((FAIL+1))
              fi
            else
              echo "  ✗ [riscv64] $NAME: compilation failed"
              FAIL=$((FAIL+1))
            fi
          done
          echo "RISC-V 64: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: "Summary: Cross-Architecture Results"
        if: always()
        run: |
          echo "========================================="
          echo "Cross-Architecture Test Summary"
          echo "========================================="
          echo "Architectures tested: x86_64, i686, AArch64, RISC-V 64"
          echo "QEMU binaries used: qemu-i386-static, qemu-aarch64-static, qemu-riscv64-static"
          echo "Test programs: return42, add, factorial, loop, cond"

  # ---------------------------------------------------------------------------
  # Job 5: Fmt — Verify code formatting consistency
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
